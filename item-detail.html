<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Street Spice Co — Item Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=3" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
  <style>
    :root {
      --detail-bg: #0E0706; 
    }

    body {
      background-color: var(--detail-bg);
      color: var(--cream);
      overflow-x: hidden;
    }

    .header.scrolled {
       background: rgba(14, 7, 6, 0.85);
       backdrop-filter: blur(20px);
       -webkit-backdrop-filter: blur(20px);
       border-bottom: 1px solid rgba(201, 168, 76, 0.1);
    }

    .detail-hero {
      position: relative;
      height: 75svh;
      min-height: 600px;
      width: 100%;
      overflow: hidden;
    }

    .detail-hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.15);
      filter: brightness(0.9);
    }

    .detail-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--detail-bg) 0%, transparent 60%),
                  radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
    }

    .detail-content {
      margin-top: -150px;
      position: relative;
      z-index: 5;
      padding-bottom: 100px;
    }

    .detail-card {
      background: #1A0C0C;
      padding: 4rem;
      border-radius: var(--radius);
      border: 1px solid rgba(201, 168, 76, 0.15);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
      opacity: 0;
      transform: translateY(40px);
    }

    .item-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .item-category {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.3em;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .item-price {
      font-family: var(--ff-serif);
      font-size: 2rem;
      color: var(--cream);
      font-weight: 400;
    }

    .item-title {
      font-family: var(--ff-serif);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      margin-bottom: 2rem;
      line-height: 1.05;
      letter-spacing: -0.01em;
    }

    .item-desc {
      font-size: 1.15rem;
      line-height: 1.9;
      color: rgba(249, 243, 232, 0.85);
      max-width: 75ch;
      margin-bottom: 4rem;
      font-family: var(--ff-cormorant);
    }

    .item-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 3rem;
      margin-bottom: 4rem;
      padding: 3rem 0;
      border-top: 1px solid rgba(201, 168, 76, 0.12);
      border-bottom: 1px solid rgba(201, 168, 76, 0.12);
    }

    .info-item h4 {
      color: var(--gold);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 0.8rem;
      font-weight: 700;
    }

    .info-item p {
      font-size: 1rem;
      font-weight: 500;
      color: var(--cream);
    }

    .detail-actions {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 2.5rem;
      transition: all 0.4s ease;
    }

    .btn-back:hover {
      color: var(--gold);
      transform: translateX(-5px);
    }

    /* Next/ Prev Nav */
    .item-nav {
      margin-top: 80px;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid rgba(201, 168, 76, 0.1);
      padding-top: 40px;
    }

    .nav-link-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-width: 45%;
    }

    .nav-link-item.prev { text-align: left; }
    .nav-link-item.next { text-align: right; }

    .nav-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--gold);
    }

    .nav-name {
      font-family: var(--ff-serif);
      font-size: 1.2rem;
      color: var(--cream);
      transition: color 0.3s ease;
    }

    .nav-link-item:hover .nav-name {
      color: var(--gold);
    }

    @media (max-width: 768px) {
      .detail-card { padding: 3rem 2rem; }
      .detail-content { margin-top: -80px; }
      .detail-hero { height: 60svh; }
      .item-info-grid { gap: 2rem; padding: 2rem 0; }
    }
  </style>
</head>

<body>
  <div class="grain-overlay" aria-hidden="true"></div>

  <header class="header scrolled" style="height: 100px;">
    <div class="nav container" style="height: 100%;">
      <a href="index.html" class="nav-logo">
        <img src="logo2.png" alt="Street Spice Co Logo" class="nav-logo-img" style="height: 90px; width: auto;" />
        <div class="nav-logo-text">
          <span class="text-white">STREET</span>
          <span class="text-maroon">SPICE CO</span>
        </div>
      </a>
      <a href="index.html#menu" class="btn-order">Menu</a>
    </div>
  </header>

  <main>
    <section class="detail-hero" id="item-hero">
      <video src="" autoplay muted loop playsinline class="detail-hero-img" id="item-img"></video>
      <div class="detail-hero-overlay"></div>
    </section>

    <div class="detail-content container">

      
      <div class="detail-card" id="main-card">
        <div class="content-split" style="display: flex; gap: 2.5rem; flex-wrap: wrap;">
          <div class="content-text-side" style="flex: 1; min-width: 320px;">
            <div class="item-meta">
              <span class="item-category" id="item-cat">Category</span>
              <span class="item-price" id="item-price">₹0</span>
            </div>
            
            <h1 class="item-title" id="item-title">Item Name</h1>
            
            <p class="item-desc" id="item-desc">
              Delicious details about this signature dish and its heritage.
            </p>
            
            <div class="item-info-grid">
              <div class="info-item">
                <h4>Ingredients</h4>
                <p id="item-ingredients">Organic sources, aromatic spices.</p>
              </div>
              <div class="info-item">
                <h4>Spice Level</h4>
                <p id="item-spice">Mild & Fragrant</p>
              </div>
              <div class="info-item">
                <h4>Best Paired With</h4>
                <p id="item-pairing">Fresh Masala Chai</p>
              </div>
            </div>
            
            <div class="detail-actions">
              <a href="index.html#contact" class="btn btn-primary">Reserve Table & Order</a>
              <button class="btn btn-ghost" onclick="window.history.back()">Go Back</button>
            </div>
          </div>
          
          <div class="content-img-side" id="extra-img-wrap" style="flex: 2.5; min-width: 450px; display: none; align-items: flex-start; justify-content: center; padding-top: 1rem;">
             <img src="" id="item-extra-img" alt="Variety" style="width: 100%; height: auto; border-radius: var(--radius); border: 1px solid rgba(201,168,76,0.15); box-shadow: 0 20px 50px rgba(0,0,0,0.4); object-fit: contain;" />
          </div>
        </div>

        <div class="item-nav" id="item-nav">
            <a href="#" class="nav-link-item prev" id="prev-link">
                <span class="nav-label">Previous Dish</span>
                <span class="nav-name" id="prev-name">—</span>
            </a>
            <a href="#" class="nav-link-item next" id="next-link">
                <span class="nav-label">Next Dish</span>
                <span class="nav-name" id="next-name">—</span>
            </a>
        </div>
      </div>
    </div>
  </main>

  <script>
    const MENU_DATA = {
      'card-coconut': {
        title: 'Fresh Tender Coconut',
        category: 'Drinks',
        price: '₹140',
        img: 'video/coconut.mp4',
        desc: 'Sourced directly from organic farms, our tender coconuts are served chilled with their natural sweetness preserved. A pure, hydrating experience designed to complement spicy food perfectly.',
        ingredients: '100% Raw Coconut Water, Fresh Mint Garnish',
        spice: 'None (Refreshing)',
        pairing: 'Bombay Bhel Puri',
        extraImg: 'food/coconut extra.jpeg'
      },
      'card-bhelpuri': {
        title: 'Bombay Bhel Puri',
        category: 'Snacks',
        price: '₹120',
        img: 'video/bhel.mp4',
        desc: 'A premium take on India’s most beloved beach snack. We use light puffed rice, artisanal sev, and our duo of date-tamarind and spiced-mint chutneys for a perfect balance of crunch, sweet, and spice.',
        ingredients: 'Puffed Rice, Roasted Peanuts, Fine Sev, House-made Chutneys',
        spice: 'Medium Tangy',
        pairing: 'Fresh Coconut Water'
      },
      'card-mangolassi': {
        title: 'Alphonso Mango Lassi',
        category: 'Drinks',
        price: '₹160',
        img: 'video/lassi.mp4',
        desc: 'A velvety, thick yoghurt shake blended with hand-picked Alphonso mangoes. It is the gold standard of Indian drinks—served chilled with a sprinkle of crushed pistachios and saffron.',
        ingredients: 'Alphonso Mango Pulp, Fresh Curd, Saffron, Cardamom',
        spice: 'Sweet',
        pairing: 'Golden Samosa Chaat'
      },
      'card-panipuri': {
        title: 'Royal Pani Puri',
        category: 'Snacks',
        price: '₹110',
        img: 'video/pani.mp4',
        desc: 'Experience the "burst of India". Our puris are artisanally made for maximum crunch, filled with steamed sprouts and spiced potato. The "pani" is a secret herb-infused blend of 12 natural items.',
        ingredients: 'Crisp Puris, Moong Sprouts, Potato, Mint-Coriander Water',
        spice: 'Highly Customizable',
        pairing: 'Cold Masala Soda'
      },
      'card-desichips': {
        title: 'Loaded Desi Masala Chips',
        category: 'Snacks',
        price: '₹110',
        img: 'video/chips.mp4',
        desc: 'Hand-cut gold potatoes, double-fried for the ultimate crunch and tossed in our proprietary Street Spice blend. These aren’t just chips; they’re a savoury journey through bustling Indian spice markets.',
        ingredients: 'Organic Gold Potatoes, Signature Spice Blend, Fresh herbs',
        spice: 'Mild – Spicy',
        pairing: 'Alphonso Mango Lassi'
      },
      'card-samosachaat': {
        title: 'Golden Samosa Chaat',
        category: 'Snacks',
        price: '₹150',
        img: 'video/samosa.mp4',
        desc: 'Our golden, hand-folded samosas, gently crushed and topped with warm, slow-cooked chickpea curry, cool yoghurt, and vibrant pomegranate seeds. Every bite is a royal feast.',
        ingredients: 'Whole Wheat Samosa, Spiced Chickpeas (Chana), Sweet Yoghurt',
        spice: 'Medium Hearty',
        pairing: 'Masala Chai'
      }
    };

    function initDetail() {
      const params = new URLSearchParams(window.location.search);
      const itemId = params.get('item');
      const item = MENU_DATA[itemId];

      if (!item) {
        document.body.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; gap:20px;"><h1>Item not found.</h1><a href="index.html" class="btn btn-primary">Return Home</a></div>';
        return;
      }

      // Populate content
      document.title = `${item.title} — Street Spice Co`;
      document.getElementById('item-img').src = item.img;
      document.getElementById('item-img').alt = item.title;
      document.getElementById('item-title').textContent = item.title;
      document.getElementById('item-cat').textContent = item.category;
      document.getElementById('item-price').textContent = item.price;
      document.getElementById('item-desc').textContent = item.desc;
      document.getElementById('item-ingredients').textContent = item.ingredients;
      document.getElementById('item-spice').textContent = item.spice;
      document.getElementById('item-pairing').textContent = item.pairing;

      const extraImgWrap = document.getElementById('extra-img-wrap');
      if (item.extraImg) {
        document.getElementById('item-extra-img').src = item.extraImg;
        extraImgWrap.style.display = 'flex';
      } else {
        extraImgWrap.style.display = 'none';
      }

      // Handle Nav
      const keys = Object.keys(MENU_DATA);
      const idx = keys.indexOf(itemId);
      
      const prevKey = keys[(idx - 1 + keys.length) % keys.length];
      const nextKey = keys[(idx + 1) % keys.length];
      
      document.getElementById('prev-link').href = `item-detail.html?item=${prevKey}`;
      document.getElementById('prev-name').textContent = MENU_DATA[prevKey].title;
      document.getElementById('next-link').href = `item-detail.html?item=${nextKey}`;
      document.getElementById('next-name').textContent = MENU_DATA[nextKey].title;

      // GSAP Reveal
      if(typeof gsap !== 'undefined') {
          gsap.to('.detail-card', { opacity: 1, y: 0, duration: 1.2, ease: 'power4.out', delay: 0.3 });
          gsap.from('.detail-hero-img', { scale: 1.3, filter: 'brightness(0.5)', duration: 2, ease: 'power2.out' });
      }
    }

    window.addEventListener('DOMContentLoaded', initDetail);
  </script>
</body>

</html>
